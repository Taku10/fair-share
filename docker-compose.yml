services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/fairshare
      PORT: 5000
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173,http://localhost:5174
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "5000"

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE: /api
        VITE_SOCKET_URL: http://localhost:5173
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mongo_data:
